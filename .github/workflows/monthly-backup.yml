name: Monthly Provider Database Backup

on:
  schedule:
    # Runs at 02:00 UTC on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch:
    # Allows manual trigger from GitHub Actions tab for testing

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create archive folder if needed
        run: mkdir -p archives

      - name: Copy providers.csv to dated archive
        run: |
          DATE=$(date +%Y-%m-%d)
          cp providers.csv "archives/providers_${DATE}.csv"
          echo "Archived providers.csv as archives/providers_${DATE}.csv"

      - name: Commit the archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add archives/
          DATE=$(date +%Y-%m-%d)
          git commit -m "Monthly backup: providers_${DATE}.csv" || echo "Nothing to commit"
          git push
